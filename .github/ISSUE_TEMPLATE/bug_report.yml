name: Bug report
description: Report a problem with Stackmix so we can fix it.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

        Stackmix moves live execution between client and server, so a clear,
        minimal reproduction is the single most useful thing you can provide.
        Please fill out the sections below as completely as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you observe? Include any error output or stack traces.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: >
        Ideally the smallest TypeScript or IR program that triggers the bug,
        plus which demo or command you ran (e.g. `npm run demo:counter`).
        The smaller the repro, the faster we can fix it.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, and Stackmix version or commit.
      placeholder: "Node 20.11.0, macOS 14.4, stackmix 0.3.1 (commit abc1234)"
    validations:
      required: false

  - type: checkboxes
    id: before-submitting
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues and this has not already been reported.
          required: true
