name: Feature request
description: Suggest an idea or improvement for Stackmix.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem you
        are trying to solve before the solution — it helps us understand the
        underlying need and consider alternatives.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: >
        What problem are you trying to solve? What is the use case? Is your
        request related to a frustration or a limitation you have run into?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or workarounds you have considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, references, or screenshots about the request here.
    validations:
      required: false
