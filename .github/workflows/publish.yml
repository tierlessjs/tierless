name: Publish (npm, provenance)

# Publishes tierless + create-tierless to npm on a version tag (v0.2.0, …), with npm
# TRUSTED PUBLISHING: no long-lived token anywhere — the job authenticates to npm via a
# GitHub OIDC id-token, and `--provenance` ties the published tarball to this exact commit
# and workflow run (the green "Built and signed" checkmark on npmjs.com).
#
# One-time setup:
#   1. GitHub: repo Settings → Environments → create "npm-publish", add yourself as a
#      required reviewer. The job runs in that environment, so every publish waits for a
#      human approval click between the tag push and npm — the last gate before an
#      irreversible publish.
#   2. npmjs.com (per package → Settings → Trusted publisher): GitHub Actions /
#      repository: tierlessjs/tierless / workflow: publish.yml / environment: npm-publish.
#      Filling the environment field pins npm's OIDC match to this environment — a
#      workflow run outside it can't publish even from this repo.
# Two ways to release (both end in the same gate + approval + publish):
#   - push a version tag:  git tag v<version> && git push --tags
#   - or dispatch this workflow (Actions → Publish → Run workflow, or the API): it mints the
#     tag from package.json itself, then continues into the gate and publish IN THIS RUN.
#     (A tag pushed with the default GITHUB_TOKEN deliberately does not re-trigger workflows —
#     GitHub's recursion protection — which is exactly why the dispatch path doesn't hand off
#     to the tag trigger and instead just keeps going.)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # dispatch mints the release tag; both paths create the GitHub Release
  id-token: write   # the OIDC token npm exchanges for a short-lived publish credential

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Ensure npm supports trusted publishing (needs >= 11.5.1)
        run: npm install -g npm@latest && npm --version

      - name: Install dependencies
        run: npm ci

      - name: Resolve the release version (tag push asserts the tag; dispatch mints it)
        run: |
          V=$(node -p "require('./packages/tierless/package.json').version")
          C=$(node -p "require('./packages/create-tierless/package.json').version")
          test "$V" = "$C" || { echo "tierless ($V) and create-tierless ($C) versions differ"; exit 1; }
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            EXISTING=$(git ls-remote --tags origin "refs/tags/v$V" | cut -f1)
            if [ -z "$EXISTING" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag "v$V" && git push origin "v$V"
              echo "minted tag v$V — continuing into the gate and publish in this run"
            elif [ "$EXISTING" = "$GITHUB_SHA" ]; then
              # same-sha retry (e.g. a registry hiccup between the two publishes) — the publish
              # steps below skip whatever already landed.
              echo "tag v$V already points at this commit — retrying its publish"
            else
              # A version describes ONE source commit. The tag marks where v$V shipped from and is
              # never moved or deleted; if the source has changed since (this commit ≠ the tag),
              # that is a NEW release, whether v$V completed or not — bump and dispatch again.
              echo "tag v$V exists at $EXISTING, not this commit — a version is one source commit; bump the package versions and dispatch a new release"; exit 1
            fi
          else
            test "v$V" = "$GITHUB_REF_NAME" || { echo "tag $GITHUB_REF_NAME != package version v$V"; exit 1; }
          fi

      - name: The full CI gate (never publish what would fail CI)
        run: |
          npm run build -w tierless
          npm run build -w create-tierless
          tsc -p test/e2e/app/tsconfig.json
          git diff --exit-code -- packages/tierless/src packages/tierless/bin packages/tierless/types packages/create-tierless/index.mjs test/e2e/app/h.mjs test/e2e/app/components.mjs test/e2e/app/render.mjs
          npm run typecheck
          npm run lint
          npm test

      # Test the ARTIFACT, not the checkout: pack both tarballs, then prove every exports-map
      # subpath imports from the installed pack, the installed bin compiles a machine that steps,
      # and the packed scaffolder yields an app that builds against the packed framework. This is
      # the class the source-tree suite can't catch (a file missing from the pack, a broken
      # exports path) — and the reason a broken publish would otherwise reach npm unreversibly.
      - name: Smoke-test the packed tarballs
        run: |
          npm pack -w tierless -w create-tierless --pack-destination "$RUNNER_TEMP"
          mkdir -p "$RUNNER_TEMP/app" && cd "$RUNNER_TEMP/app" && npm init -y > /dev/null
          npm install --no-save react "$RUNNER_TEMP"/tierless-*.tgz
          node --input-type=module -e '
            const subs = ["tierless","tierless/api","tierless/server","tierless/browser","tierless/react","tierless/vite","tierless/compiler","tierless/runtime","tierless/wire","tierless/delta","tierless/graph","tierless/heap","tierless/fetch","tierless/content","tierless/transport"];
            for (const s of subs) await import(s);
            console.log(subs.length + "/15 subpaths import from the installed tarball");'
          echo 'function go(x){ const r = api.get(x); return r + 1; }' > app.src.js
          npx tierless build app.src.js app.gen.mjs --bare
          node --input-type=module -e '
            const m = await import("./app.gen.mjs");
            const r = m.PROGRAMS.go({ fn: "go", pc: 0, args: [4] });
            if (r.op !== "resource" || r.name !== "api.get") throw new Error("bad machine step: " + JSON.stringify(r));
            console.log("the installed bin compiles and the machine steps correctly");'
          mkdir "$RUNNER_TEMP/pkg" && tar -xzf "$RUNNER_TEMP"/create-tierless-*.tgz -C "$RUNNER_TEMP/pkg"
          node "$RUNNER_TEMP/pkg/package/index.mjs" "$RUNNER_TEMP/scaffold"
          cd "$RUNNER_TEMP/scaffold" && npm install --no-save "$RUNNER_TEMP"/tierless-*.tgz
          npx tierless build app.src.js app.gen.mjs --bare && test -f app.gen.mjs
          echo "the packed scaffolder produces an app that builds with the packed framework"

      # Idempotent: a two-package publish can fail between the two (it did — run 2 published
      # tierless, then npm refused create-tierless), and npm forbids republishing an existing
      # version. A retry must skip what already landed instead of dying on it.
      - name: Publish tierless
        run: |
          V=$(node -p "require('./packages/tierless/package.json').version")
          if npm view "tierless@$V" version > /dev/null 2>&1; then echo "tierless@$V is already on the registry — skipping"
          else npm publish --provenance --access public -w tierless; fi

      - name: Publish create-tierless
        run: |
          V=$(node -p "require('./packages/create-tierless/package.json').version")
          if npm view "create-tierless@$V" version > /dev/null 2>&1; then echo "create-tierless@$V is already on the registry — skipping"
          else npm publish --provenance --access public -w create-tierless; fi

      # Second surface, same notes: the GitHub Release publishes this version's hand-written
      # CHANGELOG section to the repo's Releases tab / watchers / feed. Runs only after both
      # npm publishes, so a release entry always means "it is actually on the registry".
      - name: Create the GitHub Release from the CHANGELOG section
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V=$(node -p "require('./packages/tierless/package.json').version")
          if gh release view "v$V" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "release v$V already exists — skipping"; exit 0
          fi
          node -e '
            const fs = require("fs");
            const v = require("./packages/tierless/package.json").version;
            const sec = fs.readFileSync("CHANGELOG.md", "utf8").split(/^## /m).find((s) => s.startsWith(v + " "));
            if (!sec) { console.error("no CHANGELOG section for " + v + " — write the release notes first"); process.exit(1); }
            fs.writeFileSync(process.env.RUNNER_TEMP + "/notes.md", sec.split("\n").slice(1).join("\n").trim() + "\n");
          '
          gh release create "v$V" --repo "$GITHUB_REPOSITORY" --title "v$V" --notes-file "$RUNNER_TEMP/notes.md"
