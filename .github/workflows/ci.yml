name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated .mjs/.d.mts match the committed TypeScript source
        run: |
          npm run build -w tierless
          git diff --exit-code -- packages/tierless/src packages/tierless/types

      - name: Lint
        run: npm run lint

      - name: Test (every demo + probe, headless)
        run: npm test
